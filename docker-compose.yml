# Requires a .env file at the repository root (copy from .env.example).
# Run: docker compose up --build  →  http://localhost:8080

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: apartment-sqlserver
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:?Create .env from .env.example and set SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: apartment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: src/ApartmentManagement.API/Dockerfile
    container_name: apartment-api
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HICAS_ApartmentManagementDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Redis__ConnectionString: "redis:6379,abortConnect=false"
      Jwt__Key: ${JWT__KEY:?Set JWT__KEY in .env (at least 32 characters)}
      Jwt__Issuer: "ApartmentManagement"
      Jwt__Audience: "ApartmentManagementClient"
      Upload__BasePath: "/app/uploads"
      # Serilog file sinks; must match volume mount below (see Program.cs Logs:Path)
      Logs__Path: "/app/Logs"
    ports:
      - "8080:8080"
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/Logs

volumes:
  sqlserver_data:
  redis_data:
  api_uploads:
  api_logs:
